<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1500 500" width="1500" height="500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0A0A"/>
      <stop offset="100%" style="stop-color:#111111"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1500" height="500" fill="url(#bg)"/>
  
  <!-- Subtle grid lines -->
  <line x1="0" y1="250" x2="1500" y2="250" stroke="#C8FF00" stroke-width="0.5" opacity="0.08"/>
  <line x1="750" y1="0" x2="750" y2="500" stroke="#C8FF00" stroke-width="0.5" opacity="0.08"/>
  <line x1="375" y1="0" x2="375" y2="500" stroke="#C8FF00" stroke-width="0.3" opacity="0.05"/>
  <line x1="1125" y1="0" x2="1125" y2="500" stroke="#C8FF00" stroke-width="0.3" opacity="0.05"/>
  <line x1="0" y1="125" x2="1500" y2="125" stroke="#C8FF00" stroke-width="0.3" opacity="0.05"/>
  <line x1="0" y1="375" x2="1500" y2="375" stroke="#C8FF00" stroke-width="0.3" opacity="0.05"/>
  
  <!-- Glow behind hex -->
  <circle cx="200" cy="250" r="140" fill="#C8FF00" opacity="0.06"/>
  
  <!-- Hexagon icon -->
  <g transform="translate(200, 250)">
    <polygon points="0,-80 69,-40 69,40 0,80 -69,40 -69,-40" fill="#C8FF00"/>
    <polygon points="0,-52 45,-26 45,26 0,52 -45,26 -45,-26" fill="#0A0A0A"/>
    <polygon points="0,-28 24,-14 24,14 0,28 -24,14 -24,-14" fill="#C8FF00"/>
    <polygon points="0,-17 15,-8 15,8 0,17 -15,8 -15,-8" fill="#0A0A0A"/>
    <circle cx="0" cy="0" r="6" fill="#C8FF00"/>
  </g>
  
  <!-- COGNOXIDE text -->
  <text x="330" y="230" font-family="'Arial Black', 'Helvetica', sans-serif" font-size="100" font-weight="900" letter-spacing="10" fill="#FFFFFF">COGNO</text>
  <text x="790" y="230" font-family="'Arial Black', 'Helvetica', sans-serif" font-size="100" font-weight="900" letter-spacing="10" fill="#C8FF00">X</text>
  <text x="870" y="230" font-family="'Arial Black', 'Helvetica', sans-serif" font-size="100" font-weight="900" letter-spacing="10" fill="#FFFFFF">IDE</text>
  
  <!-- Tagline -->
  <text x="330" y="300" font-family="'Arial', 'Helvetica', sans-serif" font-size="24" font-weight="400" letter-spacing="6" fill="#666666">PURE COGNITIVE FUEL</text>
  
  <!-- Decorative dots -->
  <circle cx="1200" cy="150" r="2" fill="#C8FF00" opacity="0.3"/>
  <circle cx="1300" cy="200" r="3" fill="#C8FF00" opacity="0.2"/>
  <circle cx="1350" cy="320" r="2" fill="#C8FF00" opacity="0.25"/>
  <circle cx="1150" cy="380" r="4" fill="#C8FF00" opacity="0.15"/>
  <circle cx="1250" cy="100" r="2" fill="#C8FF00" opacity="0.2"/>
  
  <!-- Bottom accent line -->
  <rect x="330" y="330" width="120" height="3" fill="#C8FF00" rx="1.5"/>
</svg>
